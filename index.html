  { tag: "暖身", test: (item) => textOf(item).toLowerCase().includes("warm") || textOf(item).includes("暖身") },
  { tag: "高燃脂", test: (item) => textOf(item).includes("燃脂") || textOf(item).includes("暴汗") || textOf(item).toLowerCase().includes("cardio") },
  { tag: "有氧舞蹈", test: (item) => textOf(item).includes("有氧") || textOf(item).toLowerCase().includes("aerobic") || textOf(item).toLowerCase().includes("dance") },
  { tag: "跟跳", test: (item) => textOf(item).includes("跟跳") || textOf(item).includes("一起跳") || textOf(item).toLowerCase().includes("follow along") || textOf(item).toLowerCase().includes("non stop") || textOf(item).toLowerCase().includes("non-stop") },
];

const categories = ["全部", ...new Set(data.videos.map((item) => item.category))];
const regions = [
  "全部",
  ...[...new Set([...data.videos, ...data.channels].map((item) => item.region_query).filter(Boolean))]
    .sort((a, b) => regionSortValue(a) - regionSortValue(b) || labelFor(a).localeCompare(labelFor(b), "zh-Hant")),
];
const availableTags = ["舞蹈有氧", "有氧舞蹈", "拉丁有氧", "跟跳", "長輩友善", "Zumba Gold", "低衝擊", "椅子運動", "初學者", "完整課程", "短時間", "暖身", "高燃脂"];

const elements = {
  videoTotal: document.querySelector("#videoTotal"),
  channelTotal: document.querySelector("#channelTotal"),
  regionTotal: document.querySelector("#regionTotal"),
  searchInput: document.querySelector("#searchInput"),
  typeTabs: document.querySelector("#typeTabs"),
  categoryFilter: document.querySelector("#categoryFilter"),
  categoryChips: document.querySelector('[data-filter="category"]'),
  regionChips: document.querySelector('[data-filter="region"]'),
  tagChips: document.querySelector('[data-filter="tags"]'),
  resultCount: document.querySelector("#resultCount"),
  activeFilters: document.querySelector("#activeFilters"),
  resetButton: document.querySelector("#resetButton"),
  results: document.querySelector("#results"),
  template: document.querySelector("#cardTemplate"),
};

init();

function init() {
  elements.videoTotal.textContent = data.videos.length;
  elements.channelTotal.textContent = data.channels.length;
  elements.regionTotal.textContent = regions.length - 1;
  renderChipGroup(elements.categoryChips, categories, state.category, "category");
  renderChipGroup(elements.regionChips, regions, state.region, "region");
  renderTagChips();
  bindEvents();
  render();
}

function bindEvents() {
  elements.searchInput.addEventListener("input", (event) => {
    state.search = event.target.value.trim();
    render();
  });

  elements.typeTabs.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-type]");
    if (!button) return;
    state.type = button.dataset.type;
    elements.typeTabs.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
    elements.categoryFilter.hidden = state.type === "channels";
    render();
  });

  elements.resetButton.addEventListener("click", () => {
    state.search = "";
    state.category = "全部";
    state.region = "全部";
    state.tags.clear();
    elements.searchInput.value = "";
    renderChipGroup(elements.categoryChips, categories, state.category, "category");
    renderChipGroup(elements.regionChips, regions, state.region, "region");
    renderTagChips();
    render();
  });
}

function renderChipGroup(container, values, activeValue, key) {
  container.replaceChildren(...values.map((value) => {
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = labelFor(value);
    button.className = value === activeValue ? "active" : "";
    button.addEventListener("click", () => {
      state[key] = value;
      renderChipGroup(container, values, value, key);
      render();
    });
    return button;
  }));
}

function renderTagChips() {
  elements.tagChips.replaceChildren(...availableTags.map((tag) => {
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = tag;
    button.className = state.tags.has(tag) ? "active" : "";
    button.addEventListener("click", () => {
      state.tags.has(tag) ? state.tags.delete(tag) : state.tags.add(tag);
      renderTagChips();
      render();
    });
    return button;
  }));
}

function render() {
  const items = state.type === "videos" ? data.videos : data.channels;
  const filtered = items.map(enrichItem).filter(matchesFilters);

  elements.resultCount.textContent = `${filtered.length} 筆結果`;
  elements.activeFilters.textContent = describeFilters();
  elements.results.replaceChildren();

  if (!filtered.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "沒有符合條件的資料，試著減少標籤或換一個關鍵字。";
    elements.results.append(empty);
    return;
  }

  filtered.forEach((item) => elements.results.append(renderCard(item)));
}

function enrichItem(item) {
  const tags = tagsFor(item);
  return { ...item, tags };
}

function matchesFilters(item) {
  const haystack = [
    item.title,
    item.channel,
    item.sample_video_title,
    item.found_by_query,
    item.search_query,
    item.category,
    item.region_query,
    item.tags.join(" "),
  ].join(" ").toLowerCase();

  const searchTerms = expandSearchTerms(state.search);
  const searchMatch = searchTerms.every((group) => group.some((term) => haystack.includes(term)));
  const categoryMatch = state.type === "channels" || state.category === "全部" || item.category === state.category;
  const regionMatch = state.region === "全部" || item.region_query === state.region;
  const tagMatch = [...state.tags].every((tag) => item.tags.includes(tag));
  return searchMatch && categoryMatch && regionMatch && tagMatch;
}

function renderCard(item) {
  const node = elements.template.content.firstElementChild.cloneNode(true);
  const isVideo = state.type === "videos";
  const title = isVideo ? item.title : item.channel;
  const channelName = isVideo ? item.channel : `代表影片：${item.sample_video_title}`;
  const metaParts = isVideo
    ? [channelName, item.duration, item.published, item.views].filter(Boolean)
    : [channelName, `搜尋：${item.found_by_query}`].filter(Boolean);

  node.querySelector(".kind").textContent = isVideo ? categoryShort(item.category) : "頻道";
  node.querySelector(".region").textContent = labelFor(item.region_query);
  node.querySelector("h2").textContent = title;
  node.querySelector(".meta").textContent = metaParts.join(" · ");

  const tagRow = node.querySelector(".tag-row");
  tagRow.replaceChildren(...item.tags.slice(0, 5).map((tag) => {
    const span = document.createElement("span");
    span.className = "tag";
    span.textContent = tag;
    return span;
  }));

  const actions = node.querySelector(".card-actions");
  actions.append(actionLink(isVideo ? item.url : item.channel_url, isVideo ? "觀看影片" : "開啟頻道"));
  if (isVideo && item.channel_handle) {
    actions.append(actionLink(`https://www.youtube.com${item.channel_handle}`, "頻道", "secondary"));
  }
  if (!isVideo && item.sample_video_url) {
    actions.append(actionLink(item.sample_video_url, "代表影片", "secondary"));
  }

  return node;
}

function actionLink(url, label, className = "") {
  const link = document.createElement("a");
  link.href = url || "#";
  link.target = "_blank";
  link.rel = "noreferrer";
  link.textContent = label;
  if (className) link.className = className;
  return link;
}

function tagsFor(item) {
  const tags = new Set();
  if (item.category?.includes("長輩")) tags.add("長輩友善");
  if (item.category?.includes("一般")) tags.add("舞蹈有氧");
  if (item.region_query) tags.add(labelFor(item.region_query));
  tagRules.forEach((rule) => {
    if (rule.test(item)) tags.add(rule.tag);
  });
  return [...tags];
}

function textOf(item) {
  return [item.title, item.sample_video_title, item.search_query, item.found_by_query, item.category].filter(Boolean).join(" ");
}

function expandSearchTerms(search) {
  const aliasGroups = {
    "舞蹈有氧": ["舞蹈有氧", "有氧舞蹈", "dance workout", "dance fitness", "cardio dance", "aerobic", "zumba", "倫巴", "尊巴"],
    "有氧舞蹈": ["有氧舞蹈", "舞蹈有氧", "dance workout", "dance fitness", "cardio dance", "aerobic"],
    "倫巴": ["倫巴", "rumba", "zumba", "尊巴", "ズンバ", "줌바", "latin"],
    "zumba": ["zumba", "倫巴", "尊巴", "ズンバ", "줌바", "latin"],
    "尊巴": ["尊巴", "zumba", "倫巴", "ズンバ", "줌바"],
    "跟跳": ["跟跳", "一起跳", "follow along", "workout", "non stop", "non-stop"],
    "長輩": ["長輩", "銀髮", "樂齡", "senior", "シニア", "시니어"],
    "低衝擊": ["低衝擊", "低強度", "low impact"],
  };
  return search.toLowerCase().split(/\s+/).filter(Boolean).map((term) => aliasGroups[term] || [term]);
}

function minutes(duration = "") {
  const parts = duration.split(":").map((part) => Number(part));
  if (parts.some(Number.isNaN)) return 0;
  if (parts.length === 3) return parts[0] * 60 + parts[1] + parts[2] / 60;
  if (parts.length === 2) return parts[0] + parts[1] / 60;
  return 0;
}

function labelFor(value) {
  return regionNames[value] || value;
}

function regionSortValue(value) {
  const index = regionOrder.indexOf(value);
  return index === -1 ? 99 : index;
}

function categoryShort(category = "") {
  return category.includes("長輩") ? "長輩友善" : "舞蹈有氧";
}

function describeFilters() {
  const filters = [];
  filters.push(state.type === "videos" ? "影片" : "頻道");
  if (state.search) filters.push(`搜尋「${state.search}」`);
  if (state.type === "videos" && state.category !== "全部") filters.push(categoryShort(state.category));
  if (state.region !== "全部") filters.push(labelFor(state.region));
  if (state.tags.size) filters.push([...state.tags].join("、"));
  return filters.join(" / ");
}

    </script>
  </body>
